<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconocimiento, Análisis e Indexación de Imágenes</title>
    <link rel="stylesheet" href="resources/css/estilos.css">
</head>

<body>
    <!-- Encabezado de la Universidad -->
    <header class="univ-header">
        <div class="logo-container">  
            <img src="resources/img/logo2.png" alt="Universidad" class="univ-logo">
    </header>

    <div class="container">
        <h2>Subir y visualizar la imagen.</h2>

        <!-- Input para seleccionar la imagen -->
        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
            <p>📷 <strong>Haz clic aquí</strong> para cargar o arrastrar el archivo de imagen</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <!-- Área donde se renderizará el archivo subido -->
        <div class="preview-container">
            <span id="placeholder-text">Ninguna imagen seleccionada</span>
            <img id="img-preview" alt="Vista previa del archivo cargado">
        </div>
        <button onclick="subirImagen()" class="btn btn-subir">Subir Imagen</button>
    </div>

    <!-- SECCIÓN 2: VERIFICACIÓN DE INFORMACIÓN EN BASE DE DATOS (Parte Posterior) -->
    <div class="container">

        <!-- Tabla de existencias -->
        <a href="listado.html" class="back-button">Ver listado</a>

        <div id="contenedorTabla" class="db-table-wrapper" style="display: none; margin-top: 20px;">
            <table class="db-table">
                <thead>
                    <tr>
                        <th>Nombre persona</th>
                        <th>Porcentaje confianza</th>
                        <th>Fuente de referencia</th>
                    </tr>
                </thead>
                <tbody id="db-rows">

                </tbody>
            </table>
            <div class="contenedor-botones">
                <button class="btn btn-guardar" id="btn-grabar">Guardar</button>
            </div>
        </div>

    </div>

    <div id="mensajeNoResultados" style="display: none; margin-top: 20px; color: #ff0000; font-weight: bold;">
        No se reconocieron celebridades en esta imagen.
    </div>
    <script src="resources/js/funcionalidad.js" type="text/javascript"></script>
    <script src="resources/js/predecir.js" type="text/javascript"></script>
    <!--<script src="resources/js/grabar.js" type="text/javascript"></script>-->

</body>

</html>
